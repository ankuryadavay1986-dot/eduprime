  <script>
    /* ── Instant theme apply — no flash ── */
    (function() {
      var DARK_COLOR  = "#07070f";
      var LIGHT_COLOR = "#f4f4f8";

      function setThemeColorMeta(isLight) {
        var meta = document.getElementById("meta-theme-color");
        if (meta) meta.setAttribute("content", isLight ? LIGHT_COLOR : DARK_COLOR);
      }

      var saved = localStorage.getItem("ep_dark_mode");
      var isLight;
      if (saved !== null) {
        isLight = saved === "0";
      } else {
        isLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      }
      if (isLight) document.documentElement.classList.add("light-mode");
      setThemeColorMeta(isLight);

      // Keep status-bar / address-bar color synced whenever theme changes
      // (e.g. user toggles dark mode from Settings in another tab, or this tab).
      window.addEventListener("storage", function (e) {
        if (e.key === "ep_dark_mode") {
          var nowLight = e.newValue === "0";
          document.documentElement.classList.toggle("light-mode", nowLight);
          setThemeColorMeta(nowLight);
        }
      });

      // React to system theme change only when user hasn't set an explicit preference.
      window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", function (e) {
        if (localStorage.getItem("ep_dark_mode") === null) {
          document.documentElement.classList.toggle("light-mode", e.matches);
          setThemeColorMeta(e.matches);
        }
      });

      // Expose so other scripts on this page (e.g. an in-page dark-mode switch) can call it.
      window.__epSetThemeColor = setThemeColorMeta;
    })();
