<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0a0a0f" id="meta-theme-color"/>
  <title>Sign In — Edu Prime</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #f0eff8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ff-body, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* ── Background blobs ── */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .blob1 {
      width: 340px; height: 340px;
      background: radial-gradient(circle, #7c3aed22, transparent 70%);
      top: -80px; left: -80px;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .blob2 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, #4f46e515, transparent 70%);
      bottom: -60px; right: -60px;
      animation: blobFloat 10s ease-in-out infinite reverse;
    }
    .blob3 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, #06b6d40a, transparent 70%);
      top: 50%; right: 20%;
      animation: blobFloat 12s ease-in-out infinite;
    }
    @keyframes blobFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    /* ── Auth Card ── */
    .auth-page-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border: 1px solid rgba(124, 58, 237, 0.15);
      border-radius: 24px;
      padding: 36px 28px 32px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.06),
        0 24px 64px rgba(124,58,237,0.08),
        0 0 80px rgba(124,58,237,0.05);
    }

    /* ── Logo ── */
    .auth-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }
    .auth-logo-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
    }
    .auth-logo-icon svg { color: #fff; }
    .auth-app-name {
      font-size: 1.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    .auth-tagline {
      font-size: .75rem;
      color: #6b7280;
      margin-top: 2px;
    }

    /* ── Tabs ── */
    .auth-tab-bar {
      display: flex;
      background: #f0eff8;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
      border: 1px solid #e5e3f0;
    }
    .auth-tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: #9ca3af;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s ease;
    }
    .auth-tab-btn.active {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 12px rgba(124,58,237,0.35);
    }

    /* ── Form ── */
    .auth-form { display: flex; flex-direction: column; gap: 14px; }

    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field label {
      font-size: .74rem;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      color: rgba(124,58,237,0.7);
      display: flex;
      pointer-events: none;
    }
    .auth-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: #f9f8ff;
      border: 1.5px solid #e5e3f0;
      border-radius: 12px;
      color: #1a1730;
      font-size: .9rem;
      outline: none;
      transition: all .2s ease;
      font-family: inherit;
    }
    .auth-input::placeholder { color: #c4b5fd; }
    .auth-input:focus {
      border-color: rgba(124,58,237,0.6);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }
    .toggle-pass {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: #c4b5fd;
      cursor: pointer;
      padding: 4px;
      display: flex;
      transition: color .2s;
    }
    .toggle-pass:hover { color: #7c3aed; }

    /* ── Divider ── */
    .form-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #9ca3af;
      font-size: .72rem;
    }
    .form-divider::before,
    .form-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e3f0;
    }

    /* ── Submit btn ── */
    .btn-auth-main {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(124,58,237,0.35);
      margin-top: 4px;
      font-family: inherit;
    }
    .btn-auth-main:hover { opacity: .88; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(124,58,237,0.4); }
    .btn-auth-main:active { transform: translateY(0); }
    .btn-auth-main:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* Spinner inside btn */
    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-auth-main.loading .btn-spinner { display: block; }
    .btn-auth-main.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Google btn ── */
    .btn-google {
      width: 100%;
      padding: 11px;
      border: 1.5px solid #e5e3f0;
      border-radius: 12px;
      background: #ffffff;
      color: #374151;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: inherit;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .btn-google:hover { background: #f9f8ff; border-color: #c4b5fd; }
    .btn-google:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Forgot / links ── */
    .forgot-link {
      text-align: right;
      margin-top: -6px;
    }
    .forgot-link button {
      background: none;
      border: none;
      color: #7c3aed;
      font-size: .75rem;
      cursor: pointer;
      font-family: inherit;
      transition: color .2s;
    }
    .forgot-link button:hover { color: #6d28d9; }

    /* ── Alert boxes ── */
    .alert {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: .8rem;
      font-weight: 500;
      display: none;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.5;
    }
    .alert.show { display: flex; }
    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      color: #6ee7b7;
    }
    .alert-info {
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.3);
      color: #c4b5fd;
    }
    .alert svg { flex-shrink: 0; margin-top: 1px; }

    /* ── Footer ── */
    .auth-footer {
      margin-top: 22px;
      text-align: center;
      font-size: .75rem;
      color: #9ca3af;
    }
    .auth-footer a {
      color: #7c3aed;
      text-decoration: none;
    }
    .auth-footer a:hover { color: #6d28d9; }

    /* ── Skip link ── */
    .skip-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: .78rem;
      color: #9ca3af;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      width: 100%;
      transition: color .2s;
    }
    .skip-link:hover { color: #6b7280; }

    /* ── Success State (after login) ── */
    .success-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 12px 0;
    }
    .success-overlay.show { display: flex; }
    .success-check {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      animation: popIn .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: #1a1730;
      margin-bottom: 6px;
    }
    .success-sub {
      font-size: .82rem;
      color: #6b7280;
    }

    /* ── Password strength ── */
    .strength-bar {
      display: none;
      gap: 4px;
      margin-top: 6px;
    }
    .strength-bar.show { display: flex; }
    .strength-seg {
      flex: 1; height: 3px; border-radius: 2px;
      background: #e5e3f0;
      transition: background .3s;
    }
    .strength-label {
      font-size: .68rem;
      margin-top: 3px;
      color: #9ca3af;
    }

    /* ── Dark mode aware ── */
    html.light-mode body { background: #f5f3ff; }
    html.light-mode .auth-page-card {
      background: rgba(255,255,255,0.95);
      border-color: rgba(124,58,237,0.15);
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    }
    html.light-mode .auth-input {
      background: rgba(0,0,0,0.03);
      border-color: rgba(0,0,0,0.1);
      color: #1a1a2e;
    }
    html.light-mode .auth-input::placeholder { color: rgba(0,0,0,0.3); }
    html.light-mode .auth-app-name { background: linear-gradient(135deg,#6d28d9,#4338ca); -webkit-background-clip:text; background-clip:text; }
    html.light-mode .auth-tagline { color: rgba(0,0,0,0.4); }
    html.light-mode .auth-tab-bar { background: rgba(0,0,0,0.04); }
    html.light-mode .auth-tab-btn { color: rgba(0,0,0,0.5); }
    html.light-mode .btn-google { color: #333; border-color: rgba(0,0,0,0.12); }
    html.light-mode .auth-footer { color: rgba(0,0,0,0.4); }
    html.light-mode .skip-link { color: rgba(0,0,0,0.35); }
    html.light-mode .form-field label { color: rgba(0,0,0,0.55); }
    html.light-mode .toggle-pass { color: rgba(0,0,0,0.35); }
    html.light-mode .form-divider { color: rgba(0,0,0,0.3); }
    html.light-mode .form-divider::before,
    html.light-mode .form-divider::after { background: rgba(0,0,0,0.08); }
  </style>
  <script>
    /* ── Instant theme apply — no flash ── */
    (function() {
      var DARK_COLOR  = "#0a0a0f";
      var LIGHT_COLOR = "#f4f4f8";

      function setThemeColorMeta(isLight) {
        var meta = document.getElementById("meta-theme-color");
        if (meta) meta.setAttribute("content", isLight ? LIGHT_COLOR : DARK_COLOR);
      }

      var saved = localStorage.getItem("ep_dark_mode");
      var isLight;
      if (saved !== null) {
        isLight = saved === "0";
      } else {
        isLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      }
      if (isLight) document.documentElement.classList.add("light-mode");
      setThemeColorMeta(isLight);

      window.addEventListener("ep-theme-change", function (e) {
        setThemeColorMeta(!e.detail.dark);
      });
      window.addEventListener("storage", function (e) {
        if (e.key === "ep_dark_mode") {
          var nowLight = e.newValue === "0";
          document.documentElement.classList.toggle("light-mode", nowLight);
          setThemeColorMeta(nowLight);
        }
      });
      window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", function (e) {
        if (localStorage.getItem("ep_dark_mode") === null) {
          document.documentElement.classList.toggle("light-mode", e.matches);
          setThemeColorMeta(e.matches);
        }
      });

      window.__epSetThemeColor = setThemeColorMeta;
    })();
  </script>
</head>
<body>

  <!-- Background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="auth-page-card" id="authCard">

    <!-- Logo -->
    <div class="auth-logo-wrap">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <div class="auth-app-name">Edu Prime</div>
      <div class="auth-tagline">Your study companion</div>
    </div>

    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-check">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-title" id="successTitle">Welcome back! 🎉</div>
      <div class="success-sub">Redirecting you to home…</div>
    </div>

    <!-- Main form area -->
    <div id="mainContent">

      <!-- Tabs -->
      <div class="auth-tab-bar">
        <button class="auth-tab-btn active" id="tabLogin">Sign In</button>
        <button class="auth-tab-btn" id="tabRegister">Register</button>
      </div>

      <!-- Alert -->
      <div class="alert alert-error" id="alertError">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertErrorText"></span>
      </div>
      <div class="alert alert-success" id="alertSuccess">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="alertSuccessText"></span>
      </div>
      <div class="alert alert-info" id="alertInfo">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        <span id="alertInfoText"></span>
      </div>

      <!-- ── LOGIN FORM ── -->
      <div id="loginSection">
        <div class="auth-form">

          <!-- Google Sign In -->
          <button class="btn-google" id="btnGoogle">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>

          <div class="form-divider">or sign in with email</div>

          <div class="form-field">
            <label>Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </span>
              <input class="auth-input" id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" inputmode="email"/>
            </div>
          </div>

          <div class="form-field">
            <label>Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input class="auth-input" id="loginPass" type="password" placeholder="Enter your password" autocomplete="current-password"/>
              <button class="toggle-pass" id="toggleLoginPass" type="button" aria-label="Toggle password">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="loginPassIcon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="forgot-link">
            <button id="btnForgot">Forgot password?</button>
          </div>

          <button class="btn-auth-main" id="btnLogin">
            <div class="btn-spinner"></div>
            <span class="btn-text">Sign In →</span>
          </button>

        </div>
      </div>

      <!-- ── REGISTER FORM ── -->
      <div id="registerSection" style="display:none">
        <div class="auth-form">

          <!-- Google Sign Up -->
          <button class="btn-google" id="btnGoogleReg">
            <svg width="18" height="18" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign up with Google
          </button>

          <div class="form-divider">or create with email</div>

          <div class="form-field">
            <label>Full Name</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input class="auth-input" id="regName" type="text" placeholder="Your full name" autocomplete="name"/>
            </div>
          </div>

          <div class="form-field">
            <label>Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </span>
              <input class="auth-input" id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" inputmode="email"/>
            </div>
          </div>

          <div class="form-field">
            <label>Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input class="auth-input" id="regPass" type="password" placeholder="Minimum 6 characters" autocomplete="new-password" id="regPass"/>
              <button class="toggle-pass" id="toggleRegPass" type="button" aria-label="Toggle password">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="regPassIcon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <!-- Password strength -->
            <div class="strength-bar" id="strengthBar">
              <div class="strength-seg" id="seg1"></div>
              <div class="strength-seg" id="seg2"></div>
              <div class="strength-seg" id="seg3"></div>
              <div class="strength-seg" id="seg4"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>

          <button class="btn-auth-main" id="btnRegister">
            <div class="btn-spinner"></div>
            <span class="btn-text">Create Account →</span>
          </button>

        </div>
      </div>

    </div><!-- /mainContent -->

    <!-- Skip (guest mode) -->
    <button class="skip-link" id="btnSkip">Continue as guest →</button>

    <!-- Footer -->
    <div class="auth-footer">
      By continuing you agree to our
      <a href="#" id="footerPrivacy">Privacy Policy</a>
    </div>

  </div><!-- /auth-page-card -->

  <script type="module" src="login.js"></script>
