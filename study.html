<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Study — Edu Prime</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    :root {
      --bar-bg:      #0d0820;
      --bar-border:  rgba(139,92,246,.32);
      /* System mode: DARK → black glow */
      --bar-glow:    0 1px 0 rgba(0,0,0,.55),
                     0 2px 18px rgba(0,0,0,.55),
                     0 0 42px rgba(0,0,0,.35);
      --back-bg:     rgba(139,92,246,.14);
      --back-border: rgba(167,139,250,.35);
      --back-color:  #c4b5fd;
      --title-color: rgba(255,255,255,.90);
      --page-bg:     #07051a;
      --frame-bg:    #05030f;
      --overlay-bg:  #060d20;
      --overlay-title: rgba(255,255,255,.9);
      --overlay-desc:  rgba(255,255,255,.42);
      --loader-bg:   #0d0820;
      --loader-text: rgba(196,181,253,.45);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bar-bg:      #faf8ff;
        --bar-border:  rgba(139,92,246,.22);
        /* System mode: LIGHT → white glow */
        --bar-glow:    0 1px 0 rgba(255,255,255,.9),
                       0 2px 16px rgba(255,255,255,.65),
                       0 0 32px rgba(255,255,255,.45);
        --back-bg:     rgba(139,92,246,.09);
        --back-border: rgba(139,92,246,.28);
        --back-color:  #7c3aed;
        --title-color: #1e0a4c;
        --page-bg:     #f5f3ff;
        --frame-bg:    #efebff;
        --overlay-bg:  #f5f3ff;
        --overlay-title: #1e0a4c;
        --overlay-desc:  rgba(30,10,76,.58);
        --loader-bg:   #f5f3ff;
        --loader-text: rgba(109,40,217,.50);
      }
    }

    .study-page {
      display: flex; flex-direction: column;
      width: 100%; height: 100dvh;
      background: var(--page-bg);
      position: fixed; inset: 0;
    }

    /* ── TOP BAR — back btn + topic title only ── */
    .study-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 0 10px;
      background: var(--bar-bg);
      border-bottom: 1px solid var(--bar-border);
      box-shadow: var(--bar-glow);
      flex-shrink: 0;
      height: 48px;
      position: relative; z-index: 50;
    }
    .back-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--back-bg);
      border: 1px solid var(--back-border);
      color: var(--back-color);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s ease;
    }
    .back-btn:active { transform: scale(.90); }
    .back-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* Topic title */
    .study-title {
      flex: 1;
      min-width: 0;
      font-family: 'DM Sans','Inter',system-ui,sans-serif;
      font-size: .85rem;
      font-weight: 600;
      color: var(--title-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: .01em;
    }

    /* Fullscreen toggle btn */
    .fs-btn {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--back-bg);
      border: 1px solid var(--back-border);
      color: var(--back-color);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: transform .15s ease;
    }
    .fs-btn:active { transform: scale(.90); }
    .fs-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    /* Fullscreen mode — bar hides, iframe fills all */
    .study-page.fs-mode .study-bar { display: none; }
    .study-page.fs-mode .frame-container { height: 100dvh; }

    /* Floating exit pill */
    .fs-exit-pill {
      position: fixed;
      top: 14px; left: 50%;
      transform: translateX(-50%) translateY(-90px);
      z-index: 10000;
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px 7px 10px;
      background: rgba(6,13,32,.88);
      border: 1px solid rgba(59,130,246,.4);
      border-radius: 50px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 4px 22px rgba(0,0,0,.5);
      cursor: pointer;
      opacity: 0;
      transition: transform .38s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .fs-exit-pill.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .fs-exit-pill svg { width: 15px; height: 15px; stroke: #93c5fd; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .fs-exit-pill span { font-family: 'DM Sans','Inter',sans-serif; font-size: .75rem; font-weight: 600; color: rgba(255,255,255,.88); white-space: nowrap; }

    /* ── FRAME CONTAINER — takes all remaining height ── */
    .frame-container {
      flex: 1; position: relative;
      overflow: hidden;
      background: var(--frame-bg);
      min-height: 0;
    }

    /* iframe — cropped to hide PW header/tabs */
    .study-iframe {
      position: absolute;
      top: -225px; left: 0;
      width: 100%; height: calc(100% + 260px);
      border: none; display: block;
      background: var(--frame-bg);
      visibility: hidden;
      z-index: 1;
    }

    /* ── COLOR WASH — violet/indigo glow overlay ── */
    .color-wash {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      /* dual-layer: solid color blend + radial glow */
      background:
        radial-gradient(ellipse 80% 55% at 50% 0%,   rgba(139,92,246,.22) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 100%,  rgba(59,130,246,.18) 0%, transparent 65%);
      mix-blend-mode: screen;
    }
    /* thin chromatic border shimmer at top & bottom */
    .color-wash::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg,
          rgba(167,139,250,.28) 0px,
          transparent 48px),
        linear-gradient(0deg,
          rgba(99,102,241,.22) 0px,
          transparent 48px);
      pointer-events: none;
    }

    /* ── LOADER ── */
    /* ── LOADER ── */
    .study-loader {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
      background: var(--loader-bg); z-index: 30;
      overflow: hidden;
    }

    /* --- dot row animation --- */
    .loader-dots {
      display: flex; align-items: flex-end; gap: 10px;
      height: 48px;
    }
    .ld {
      width: 10px;
      border-radius: 6px;
      background: #8b5cf6;
      animation: ldBounce 1.1s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .ld:nth-child(1) { animation-delay: 0s;    background: #a78bfa; }
    .ld:nth-child(2) { animation-delay: .13s;  background: #8b5cf6; }
    .ld:nth-child(3) { animation-delay: .26s;  background: #7c3aed; }
    .ld:nth-child(4) { animation-delay: .39s;  background: #6d28d9; }
    .ld:nth-child(5) { animation-delay: .52s;  background: #5b21b6; }
    @keyframes ldBounce {
      0%, 100% { height: 10px; opacity: .35; }
      45%       { height: 44px; opacity: 1;   }
    }

    /* glow behind dots */
    .loader-glow {
      position: absolute;
      width: 160px; height: 60px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(139,92,246,.30) 0%, transparent 75%);
      filter: blur(18px);
      pointer-events: none;
      animation: glowPulse 1.8s ease-in-out infinite;
    }
    @keyframes glowPulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    .loader-label {
      font-family: 'DM Sans','Inter',sans-serif;
      font-size: .78rem; color: var(--loader-text);
      text-align: center; max-width: 220px; line-height: 1.5;
      transition: color .4s ease;
      letter-spacing: .02em;
    }
    .loader-slow-icon { display: none; }

    /* ── HORIZONTAL SCROLL BAR (bottom 20px) ── */
    .loader-hscroll-wrap {
      position: absolute;
      bottom: 90px; left: 0; right: 0;
      height: 3px;
      overflow: hidden;
    }
    .loader-hscroll-track {
      width: 100%; height: 100%;
      background: rgba(139,92,246,.12);
      border-radius: 4px;
      position: relative;
    }
    .loader-hscroll-thumb {
      position: absolute;
      top: 0; left: -38%;
      width: 38%; height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, transparent, #8b5cf6, #c4b5fd, #8b5cf6, transparent);
      animation: hScroll 1.6s ease-in-out infinite;
    }
    @keyframes hScroll {
      0%   { left: -38%; }
      100% { left: 100%; }
    }

    /* ── PROGRESS BAR ── */
    .prog-bar {
      position: absolute; top: 0; left: 0;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      border-radius: 0 2px 2px 0; z-index: 35;
      transition: width .25s ease;
    }
    .prog-bar.done { width: 100%; opacity: 0; transition: width .25s ease, opacity .35s .15s; }

    /* ── BLOCKED ── */
    .blocked-overlay {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: var(--overlay-bg); padding: 32px 24px; text-align: center; z-index: 31;
    }
    .blocked-overlay.show { display: flex; }
    .blocked-icon { font-size: 2.8rem; }
    .blocked-title { font-family: 'DM Sans','Inter',sans-serif; font-size: 1rem; font-weight: 700; color: var(--overlay-title); }
    .blocked-desc { font-size: .8rem; color: var(--overlay-desc); line-height: 1.7; max-width: 260px; }
    .btn-open {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 26px; border-radius: 50px;
      background: linear-gradient(135deg,#6d28d9,#8b5cf6);
      color: #fff; font-family: 'DM Sans','Inter',sans-serif;
      font-size: .88rem; font-weight: 700;
      border: none; cursor: pointer; text-decoration: none;
      box-shadow: 0 4px 20px rgba(139,92,246,.45);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-open svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    /* ── WHATSAPP FLOATING BUTTON ── */
    .wa-fab {
      position: fixed;
      right: 16px; bottom: 26px;
      width: 44px; height: 44px;
      border-radius: 50%;
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      box-shadow: 0 3px 14px rgba(0,0,0,.32), 0 0 0 2.5px rgba(255,255,255,.55);
      cursor: grab;
      -webkit-tap-highlight-color: transparent;
      opacity: 0; transform: scale(.4);
      pointer-events: none;
      transition: opacity .3s ease, transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
      user-select: none;
      touch-action: none;
    }
    .wa-fab.show { opacity: 1; transform: scale(1); pointer-events: auto; }
    .wa-fab.dragging {
      cursor: grabbing;
      transform: scale(1.08) !important;
      box-shadow: 0 8px 28px rgba(0,0,0,.45), 0 0 0 2.5px rgba(255,255,255,.7);
      transition: box-shadow .15s ease;
    }
    .wa-fab.over-delete {
      background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
      transform: scale(0.85) !important;
      box-shadow: 0 4px 18px rgba(239,68,68,.6), 0 0 0 2.5px rgba(255,255,255,.5);
    }
    .wa-fab::before {
      content: ''; position: absolute; inset: -5px;
      border-radius: 50%;
      border: 2px solid rgba(37,211,102,.55);
      animation: waPulse 2.2s ease-out infinite;
    }
    .wa-fab.dragging::before { display: none; }
    @keyframes waPulse {
      0%   { transform: scale(.85); opacity: .9; }
      80%  { transform: scale(1.4); opacity: 0; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .wa-fab svg { width: 22px; height: 22px; fill: #fff; position: relative; z-index: 1; }

    /* ── DELETE ZONE ── */
    .wa-delete-zone {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(239,68,68,.15);
      border: 2px dashed rgba(239,68,68,.6);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      z-index: 9998;
      pointer-events: none;
      transition: bottom .35s cubic-bezier(.34,1.56,.64,1), opacity .3s ease, background .2s ease, border-color .2s ease;
      opacity: 0;
    }
    .wa-delete-zone.visible { bottom: 22px; opacity: 1; }
    .wa-delete-zone.active {
      background: rgba(239,68,68,.35);
      border-color: #ef4444; border-style: solid;
      transform: translateX(-50%) scale(1.15);
    }
    .wa-delete-zone svg { width: 22px; height: 22px; stroke: #ef4444; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s ease; }
    .wa-delete-zone.active svg { transform: scale(1.15); }
    .wa-delete-label { font-size: 9px; color: #ef4444; font-family: 'DM Sans','Inter',sans-serif; font-weight: 600; letter-spacing: .3px; }
  </style>
  <script>
    /* ── Instant theme apply — no flash ── */
    (function() {
      var saved = localStorage.getItem("ep_dark_mode");
      var isLight;
      if (saved !== null) {
        isLight = saved === "0";
      } else {
        isLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      }
      if (isLight) document.documentElement.classList.add("light-mode");
    })();
  </script>
</head>
<body>

<div class="study-page" id="studyPage">

  <!-- TOP BAR: back btn + topic name only -->
  <div class="study-bar">
    <button class="back-btn" id="backBtn" aria-label="Go back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="study-title" id="studyTitle">Loading…</span>
    <button class="fs-btn" id="fsBtn" aria-label="Toggle fullscreen">
      <svg id="fsIcon" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
  </div>

  <!-- Exit fullscreen floating pill (tap anywhere on it to exit) -->
  <div class="fs-exit-pill" id="fsExitPill">
    <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    <span>Exit Fullscreen</span>
  </div>

  <!-- CONTENT AREA: full remaining height -->
  <div class="frame-container" id="frameWrap">

    <div class="prog-bar" id="progressBar"></div>

    <div class="study-loader" id="studyLoader">
      <!-- glow blob -->
      <div class="loader-glow"></div>
      <!-- bouncing dots -->
      <div class="loader-dots">
        <div class="ld"></div>
        <div class="ld"></div>
        <div class="ld"></div>
        <div class="ld"></div>
        <div class="ld"></div>
      </div>
      <span class="loader-label" id="loaderLabel">Loading content…</span>
      <span class="loader-slow-icon" id="loaderSlowIcon"></span>
      <!-- horizontal scroll bar 20px from bottom -->
      <div class="loader-hscroll-wrap">
        <div class="loader-hscroll-track">
          <div class="loader-hscroll-thumb"></div>
        </div>
      </div>
    </div>

    <div class="blocked-overlay" id="blockedOverlay">
      <div class="blocked-icon">🔒</div>
      <h3 class="blocked-title">Your Internet Slow 🛜</h3>
      <p class="blocked-desc">Please Refresh Your Browser.<br/>Retry Again.</p>
      <a class="btn-open" id="openBrowserBtn" href="index.html" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open in Browser
      </a>
    </div>

    <!-- Violet/indigo glow wash -->
    <div class="color-wash"></div>

    <iframe id="studyFrame" class="study-iframe"
      allow="autoplay; encrypted-media; picture-in-picture; clipboard-write; fullscreen"
      allowfullscreen
      title="Study Content"></iframe>

  </div>
</div>

<!-- WHATSAPP DELETE ZONE -->
<div class="wa-delete-zone" id="waDeleteZone">
  <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
  <span class="wa-delete-label">Remove</span>
</div>

<!-- WHATSAPP FLOATING BUTTON -->
<div class="wa-fab" id="waFab" data-wa-link="https://whatsapp.com/channel/0029Vb87888HltY8yk0IPW1f" aria-label="Join on WhatsApp">
  <svg viewBox="0 0 32 32"><path d="M16 2C8.268 2 2 8.268 2 16c0 2.52.672 4.883 1.844 6.924L2 30l7.29-1.813A13.94 13.94 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm0 25.6a11.56 11.56 0 0 1-5.887-1.6l-.424-.252-4.328 1.076 1.1-4.216-.276-.44A11.563 11.563 0 0 1 4.4 16C4.4 9.593 9.593 4.4 16 4.4S27.6 9.593 27.6 16 22.407 27.6 16 27.6zm6.344-8.672c-.348-.176-2.06-1.016-2.38-1.132-.32-.116-.552-.176-.784.176-.232.348-.9 1.132-1.104 1.364-.204.232-.408.26-.756.088-.348-.176-1.468-.54-2.796-1.724-1.032-.924-1.728-2.064-1.932-2.412-.204-.348-.02-.536.152-.708.156-.156.348-.408.524-.612.176-.204.232-.348.348-.58.116-.232.06-.436-.028-.612-.088-.176-.784-1.892-1.076-2.592-.284-.68-.572-.588-.784-.6-.204-.012-.436-.016-.668-.016a1.285 1.285 0 0 0-.928.436c-.32.348-1.216 1.188-1.216 2.896s1.244 3.36 1.42 3.592c.176.232 2.448 3.736 5.932 5.24.828.356 1.476.568 1.98.728.832.264 1.588.228 2.188.14.668-.1 2.06-.844 2.348-1.66.292-.816.292-1.516.204-1.66-.084-.148-.316-.228-.664-.404z"/></svg>
</div>

<script>
  (function(){
    var DARK_COLOR  = '#07051a';
    var LIGHT_COLOR = '#f5f3ff';

    var meta = document.createElement('meta');
    meta.name = 'theme-color';
    meta.id = 'meta-theme-color';
    document.head.appendChild(meta);

    function setThemeColorMeta(isLight) {
      meta.content = isLight ? LIGHT_COLOR : DARK_COLOR;
    }

    function currentIsLight() {
      var saved = localStorage.getItem('ep_dark_mode');
      if (saved !== null) return saved === '0';
      return window.matchMedia('(prefers-color-scheme: light)').matches;
    }

    setThemeColorMeta(currentIsLight());

    window.addEventListener('ep-theme-change', function (e) {
      setThemeColorMeta(!e.detail.dark);
    });
    window.addEventListener('storage', function (e) {
      if (e.key === 'ep_dark_mode') setThemeColorMeta(e.newValue === '0');
    });
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function (e) {
      if (localStorage.getItem('ep_dark_mode') === null) setThemeColorMeta(e.matches);
    });

    window.__epSetThemeColor = setThemeColorMeta;
  })();
</script>

<script type="module" src="study.js"></script>
<script>
    if ("serviceWorker" in navigator) {
      var _h = location.hostname, _p = location.protocol;
      if (_p === "https:" || _h === "localhost" || _h === "127.0.0.1") {
        window.addEventListener("load", function () {
          var _b = location.pathname.substring(0, location.pathname.lastIndexOf("/") + 1);
          navigator.serviceWorker.register(_b + "sw.js", { scope: _b })
            .then(function(r){ console.log("[PWA] SW ok:", r.scope); })
            .catch(function(e){ console.warn("[PWA] SW skipped:", e.message); });
        });
      }
    }
  </script>
